name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install zig 0.15.2
        run: |
          curl -sL https://ziglang.org/builds/zig-macos-aarch64-0.15.2.tar.xz | tar xJ -C /tmp
          echo "/tmp/zig-macos-aarch64-0.15.2" >> "$GITHUB_PATH"

      - uses: extractions/setup-just@v2

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build GhosttyKit
        run: just setup

      - name: Check (test + lint + build)
        run: just check
