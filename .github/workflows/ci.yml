name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Zig 0.15.2 cannot parse the macOS SDK shipped with the runner's default
      # Xcode (26.5), so it links without libSystem and the GhosttyKit build fails
      # with undefined libc symbols. Pin Xcode 26.2 to match upstream Ghostty's
      # toolchain for this Zig version.
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Cache GhosttyKit
        id: cache-ghosttykit
        uses: actions/cache@v5
        with:
          path: |
            ghostty/macos/GhosttyKit.xcframework
            ghostty/zig-out/share/terminfo
            ghostty/zig-out/share/ghostty/themes
          key: ghosttykit-v4-${{ hashFiles('.git/modules/ghostty/HEAD') }}

      - name: Install zig 0.15.2
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: |
          curl -sL https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz | tar xJ -C /tmp
          echo "/tmp/zig-aarch64-macos-0.15.2" >> "$GITHUB_PATH"

      - name: Build GhosttyKit
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: just setup

      - name: Create xcframework symlink
        run: ln -sfn ghostty/macos/GhosttyKit.xcframework GhosttyKit.xcframework

      - name: Install SwiftLint and xcodegen
        run: brew install swiftlint xcodegen

      - name: Generate Xcode project
        run: just generate

      - name: Check (test + lint + build)
        run: just check
