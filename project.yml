name: montty
options:
  bundleIdPrefix: com.montty
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: montty-Bridging-Header.h
    HEADER_SEARCH_PATHS: $(SRCROOT)

targets:
  montty:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.montty.app
        CODE_SIGN_ENTITLEMENTS: Resources/montty.entitlements
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: montty
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)"
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_LDFLAGS: "$(inherited) -lc++"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
    postBuildScripts:
      - name: Bundle Ghostty Shell Integration
        script: |
          # Copy shell integration scripts from submodule so GhosttyKit can
          # auto-discover them and inject OSC 7 pwd reporting into shells.
          GHOST_RES="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/ghostty"
          TERMINFO_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/terminfo/78"

          # Create terminfo sentinel (GhosttyKit looks for this to find resources)
          mkdir -p "${TERMINFO_DIR}"
          touch "${TERMINFO_DIR}/xterm-ghostty"

          # Copy shell integration scripts from the Ghostty submodule source
          SHELL_INT_SRC="${SRCROOT}/ghostty/src/shell-integration"
          if [ -d "${SHELL_INT_SRC}" ]; then
            mkdir -p "${GHOST_RES}/shell-integration"
            for shell in bash zsh fish elvish; do
              if [ -d "${SHELL_INT_SRC}/${shell}" ]; then
                cp -R "${SHELL_INT_SRC}/${shell}" "${GHOST_RES}/shell-integration/"
              fi
            done
          fi

  montty-unit:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/Model
      - path: Sources/Persistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.montty.app.tests
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        # No test host -- model tests run standalone without launching the app
        TEST_HOST: ""
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)"
        HEADER_SEARCH_PATHS: $(SRCROOT)
        SWIFT_OBJC_BRIDGING_HEADER: montty-Bridging-Header.h
        OTHER_LDFLAGS: "$(inherited) -lc++"
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
