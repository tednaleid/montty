name: montty
options:
  bundleIdPrefix: com.montty
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    "icon":
      file: true

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: montty-Bridging-Header.h
    HEADER_SEARCH_PATHS: $(SRCROOT)

targets:
  montty:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: AppIcon.icon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.montty.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/montty.entitlements
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: Montty
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)"
        SWIFT_STRICT_CONCURRENCY: minimal
        OTHER_LDFLAGS: "$(inherited) -lc++"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
    postBuildScripts:
      - name: Bundle Shell Integration
        script: |
          # Bundle terminfo + Ghostty's shell integration from the submodule.
          # Terminfo provides terminal capabilities for xterm-ghostty.
          # Shell integration enables OSC 7 pwd reporting, prompt markers, etc.
          GHOST_RES="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/ghostty"
          TERMINFO_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/terminfo/78"

          # Copy compiled terminfo entries from the Ghostty submodule build output.
          # GhosttyKit uses the 78/xterm-ghostty entry as a sentinel to find resources,
          # and shells need valid terminfo for cursor movement, erase, etc.
          TERMINFO_SRC="${SRCROOT}/ghostty/zig-out/share/terminfo"
          TERMINFO_DST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/terminfo"
          if [ -d "${TERMINFO_SRC}" ]; then
            mkdir -p "${TERMINFO_DST}"
            cp -R "${TERMINFO_SRC}/"* "${TERMINFO_DST}/"
          fi

          # Copy shell integration scripts from the Ghostty submodule source.
          # These stay in sync automatically when the submodule is bumped.
          SHELL_INT_SRC="${SRCROOT}/ghostty/src/shell-integration"
          if [ -d "${SHELL_INT_SRC}" ]; then
            mkdir -p "${GHOST_RES}/shell-integration"
            for shell in bash zsh fish elvish; do
              if [ -d "${SHELL_INT_SRC}/${shell}" ]; then
                cp -R "${SHELL_INT_SRC}/${shell}" "${GHOST_RES}/shell-integration/"
              fi
            done
          fi

          # Copy theme files so GhosttyKit can resolve theme= config entries.
          THEMES_SRC="${SRCROOT}/ghostty/zig-out/share/ghostty/themes"
          if [ -d "${THEMES_SRC}" ]; then
            mkdir -p "${GHOST_RES}/themes"
            cp -R "${THEMES_SRC}/"* "${GHOST_RES}/themes/"
          fi

          # Append montty's claude() wrapper to zsh integration.
          # Injects hooks via --settings so montty receives state callbacks.
          ZSH_ENV="${GHOST_RES}/shell-integration/zsh/.zshenv"
          if [ -f "${ZSH_ENV}" ]; then
            cat >> "${ZSH_ENV}" << 'MONTTY_HOOKS'

          # montty: wrap claude to inject hook callbacks for status tracking
          if [[ -n "$MONTTY_SURFACE_ID" && -n "$MONTTY_SOCKET" ]]; then
            claude() {
              command claude --settings "{\"hooks\":{\"UserPromptSubmit\":[{\"hooks\":[{\"type\":\"command\",\"command\":\"echo '{\\\"event\\\":\\\"prompt-submit\\\",\\\"surface\\\":\\\"${MONTTY_SURFACE_ID}\\\"}' | nc -U '${MONTTY_SOCKET}' -w 1 2>/dev/null &\"}]}],\"Notification\":[{\"hooks\":[{\"type\":\"command\",\"command\":\"echo '{\\\"event\\\":\\\"notification\\\",\\\"surface\\\":\\\"${MONTTY_SURFACE_ID}\\\"}' | nc -U '${MONTTY_SOCKET}' -w 1 2>/dev/null &\"}]}],\"Stop\":[{\"hooks\":[{\"type\":\"command\",\"command\":\"echo '{\\\"event\\\":\\\"stop\\\",\\\"surface\\\":\\\"${MONTTY_SURFACE_ID}\\\"}' | nc -U '${MONTTY_SOCKET}' -w 1 2>/dev/null &\"}]}]}}" "$@"
            }
          fi
          MONTTY_HOOKS
          fi

  montty-unit:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/Model
      - path: Sources/Persistence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.montty.app.tests
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        # No test host -- model tests run standalone without launching the app
        TEST_HOST: ""
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)"
        HEADER_SEARCH_PATHS: $(SRCROOT)
        SWIFT_OBJC_BRIDGING_HEADER: montty-Bridging-Header.h
        OTHER_LDFLAGS: "$(inherited) -lc++"
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
