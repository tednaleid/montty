# veer rules - evaluated in order, first match wins.
# Run 'veer list' to see active rules, 'veer test "<cmd>"' to preview behavior.
# See .claude/skills/veer/SKILL.md for a guide on adding rules.

[[rule]]
id = "no-curl-pipe-shell"
name = "Block curl piped to a shell"
action = "reject"
message = "Don't pipe curl to bash/sh -- download, inspect, then execute."
[rule.match]
command_all = ["curl", "bash"]

[[rule]]
id = "use-just-build"
name = "Redirect xcodebuild build to just build"
action = "reject"
message = "Use 'just build' instead of invoking xcodebuild directly. It sets the correct SYMROOT and configuration."
[rule.match]
command = "xcodebuild"
arg = "build"

[[rule]]
id = "use-just-test"
name = "Redirect xcodebuild test to just test"
action = "reject"
message = "Use 'just test' instead of invoking xcodebuild directly. It sets the correct scheme, destination, and SYMROOT."
[rule.match]
command = "xcodebuild"
arg = "test"

[[rule]]
id = "use-just-clean"
name = "Redirect xcodebuild clean to just clean"
action = "reject"
message = "Use 'just clean' instead of invoking xcodebuild directly."
[rule.match]
command = "xcodebuild"
arg = "clean"

[[rule]]
id = "use-just-generate"
name = "Redirect xcodegen to just generate"
action = "reject"
message = "Use 'just generate' instead of invoking xcodegen directly."
[rule.match]
command = "xcodegen"

[[rule]]
id = "use-just-lint"
name = "Redirect swiftlint to just lint"
action = "reject"
message = "Use 'just lint' instead of invoking swiftlint directly. It runs with --strict."
[rule.match]
command = "swiftlint"

[[rule]]
id = "use-just-inspect"
name = "Redirect direct curl to debug server"
action = "reject"
message = "Use 'just inspect-*' commands instead of curling localhost:9876 directly. Run 'just --list' to see available inspect targets."
[rule.match]
command = "curl"
arg_regex = "localhost:9876"
